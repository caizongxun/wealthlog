<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WealthLog — 個人財務追蹤</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/style.css">
</head>
<body>

<!-- AUTH SCREEN -->
<div id="screen-auth" class="screen active">
  <div class="auth-container">
    <div class="auth-logo">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none" aria-label="WealthLog">
        <rect width="40" height="40" rx="10" fill="var(--color-primary)"/>
        <path d="M10 28 L16 18 L22 23 L28 12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="28" cy="12" r="2.5" fill="white"/>
      </svg>
      <span class="auth-logo-text">WealthLog</span>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">登入</button>
      <button class="auth-tab" data-tab="register">註冊</button>
    </div>
    <form id="form-login" class="auth-form active">
      <div class="field">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="your@email.com" required>
      </div>
      <div class="field">
        <label for="login-password">密碼</label>
        <input type="password" id="login-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full">登入</button>
      <p id="login-error" class="form-error"></p>
    </form>
    <form id="form-register" class="auth-form">
      <div class="field">
        <label for="reg-name">顯示名稱</label>
        <input type="text" id="reg-name" placeholder="你的名字" required>
      </div>
      <div class="field">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" placeholder="your@email.com" required>
      </div>
      <div class="field">
        <label for="reg-password">密碼</label>
        <input type="password" id="reg-password" placeholder="至少 8 字元" minlength="8" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full">建立帳號</button>
      <p id="reg-error" class="form-error"></p>
    </form>
  </div>
</div>

<!-- APP SCREEN -->
<div id="screen-app" class="screen">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <svg width="28" height="28" viewBox="0 0 40 40" fill="none" aria-label="WealthLog">
        <rect width="40" height="40" rx="10" fill="var(--color-primary)"/>
        <path d="M10 28 L16 18 L22 23 L28 12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="28" cy="12" r="2.5" fill="white"/>
      </svg>
      <span class="sidebar-title">WealthLog</span>
    </div>
    <nav class="sidebar-nav">
      <a href="#dashboard" class="nav-item active" data-page="dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        總覽
      </a>
      <a href="#transactions" class="nav-item" data-page="transactions">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 1 0 0 7h5a3.5 3.5 0 1 1 0 7H6"/></svg>
        收支記錄
      </a>
      <a href="#investments" class="nav-item" data-page="investments">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
        投資組合
      </a>
      <a href="#budgets" class="nav-item" data-page="budgets">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        預算目標
      </a>
      <a href="#categories" class="nav-item" data-page="categories">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h8m-8 6h16"/></svg>
        分類管理
      </a>
    </nav>
    <div class="sidebar-footer">
      <button id="btn-theme-toggle" class="btn-icon" aria-label="切換主題" data-theme-toggle>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <span id="user-name" class="user-name"></span>
      <button id="btn-logout" class="btn-icon" aria-label="登出">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main-content">
    <!-- Dashboard Page -->
    <div id="page-dashboard" class="page active">
      <div class="page-header">
        <h1 class="page-title">總覽</h1>
        <button class="btn btn-primary" id="btn-add-tx">+ 新增記錄</button>
      </div>
      <div class="kpi-grid" id="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-label">本月收入</div>
          <div class="kpi-value income" id="kpi-income">--</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">本月支出</div>
          <div class="kpi-value expense" id="kpi-expense">--</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">本月結餘</div>
          <div class="kpi-value" id="kpi-balance">--</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">投資總成本</div>
          <div class="kpi-value invest" id="kpi-invest">--</div>
        </div>
      </div>
      <div class="section-row">
        <section class="card">
          <h2 class="card-title">近期交易</h2>
          <div id="recent-transactions"><div class="empty-state">尚無記錄</div></div>
        </section>
        <section class="card">
          <h2 class="card-title">支出分類</h2>
          <div id="expense-breakdown"><div class="empty-state">尚無資料</div></div>
        </section>
      </div>
    </div>

    <!-- Transactions Page -->
    <div id="page-transactions" class="page">
      <div class="page-header">
        <h1 class="page-title">收支記錄</h1>
        <button class="btn btn-primary" id="btn-add-tx2">+ 新增</button>
      </div>
      <div class="filter-bar">
        <select id="tx-filter-type" class="select">
          <option value="">全部類型</option>
          <option value="income">收入</option>
          <option value="expense">支出</option>
        </select>
        <input type="month" id="tx-filter-month" class="input" value="">
      </div>
      <div class="table-wrap">
        <table class="data-table" id="tx-table">
          <thead><tr><th>日期</th><th>類型</th><th>分類</th><th>說明</th><th class="num">金額</th><th>操作</th></tr></thead>
          <tbody id="tx-tbody"><tr><td colspan="6" class="empty-state">尚無記錄</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- Investments Page -->
    <div id="page-investments" class="page">
      <div class="page-header">
        <h1 class="page-title">投資組合</h1>
        <button class="btn btn-primary" id="btn-add-invest">+ 新增持倉</button>
      </div>
      <div class="table-wrap">
        <table class="data-table" id="invest-table">
          <thead><tr><th>代號</th><th>名稱</th><th>市場</th><th class="num">持倉數量</th><th class="num">均成本</th><th class="num">總成本</th><th>操作</th></tr></thead>
          <tbody id="invest-tbody"><tr><td colspan="7" class="empty-state">尚無持倉</td></tr></tbody>
        </table>
      </div>
      <div class="page-header" style="margin-top:var(--space-8)">
        <h2 class="page-title" style="font-size:var(--text-lg)">交易記錄</h2>
        <button class="btn btn-secondary" id="btn-add-inv-tx">+ 新增交易</button>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>日期</th><th>代號</th><th>動作</th><th class="num">數量</th><th class="num">價格</th><th class="num">手續費</th><th class="num">總額</th></tr></thead>
          <tbody id="inv-tx-tbody"><tr><td colspan="7" class="empty-state">尚無記錄</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- Budgets Page -->
    <div id="page-budgets" class="page">
      <div class="page-header">
        <h1 class="page-title">預算目標</h1>
        <button class="btn btn-primary" id="btn-add-budget">+ 新增預算</button>
      </div>
      <div id="budgets-list"><div class="empty-state">尚無預算目標</div></div>
    </div>

    <!-- Categories Page -->
    <div id="page-categories" class="page">
      <div class="page-header">
        <h1 class="page-title">分類管理</h1>
        <button class="btn btn-primary" id="btn-add-cat">+ 新增分類</button>
      </div>
      <div id="categories-list"><div class="empty-state">載入中...</div></div>
    </div>
  </main>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <h3 id="modal-title">新增記錄</h3>
      <button class="btn-icon" id="modal-close" aria-label="關閉">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script type="module" src="src/app.js"></script>
</body>
</html>
